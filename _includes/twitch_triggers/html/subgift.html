<form id="SAMMITestTwitchSubGift" class="SAMMITestTriggers">
  <button type="submit" class="btn btn-primary btn-sm me-1">Community Gifts</button>
  <a class="tslCollapse collapsed" data-bs-toggle="collapse" href="#hidesubgiftamount" role="button" aria-expanded="false" aria-controls="hidesubgiftamount"></a>

  <div class="collapse" id="hidesubgiftamount" data-bs-parent="#content-triggers">
    <div class="form-group mb-2">
      <label>Gifter Username:</label>
      <input type="text" class="form-control form-control-sm w-auto" name="gifterName" placeholder="optional">
    </div>

    <div class="form-group mb-2">
      <label class="me-2">Tier:</label>

      <div class="form-check form-check-inline">
        <input type="radio" class="form-check-input" name="giftTier" value="Tier 1" checked>
        <label class="form-check-label">Tier 1</label>
      </div>

      <div class="form-check form-check-inline">
        <input type="radio" class="form-check-input" name="giftTier" value="Tier 2">
        <label class="form-check-label">Tier 2</label>
      </div>

      <div class="form-check form-check-inline">
        <input type="radio" class="form-check-input" name="giftTier" value="Tier 3">
        <label class="form-check-label">Tier 3</label>
      </div>
    </div>

    <div class="form-group mb-2">
      <label>Amount:</label>
      <input type="number" class="form-control form-control-sm w-auto" min="1" max="999" name="subGiftAmount" value="1">
    </div>
  </div>
</form>
